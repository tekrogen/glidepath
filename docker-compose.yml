services:
  postgres:
    image: postgres:16-alpine
    container_name: credit-card-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: credit_card_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d credit_card_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
